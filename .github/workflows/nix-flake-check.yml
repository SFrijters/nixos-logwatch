name: "nix flake check"
on:
  pull_request:
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
  push:
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'

jobs:
  nix-flake-check:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/nix-installer-action@v16
      with:
        determinate: true
    - uses: DeterminateSystems/flakehub-cache-action@v1

    - name: Flake metadata
      run: |
        nix flake metadata
        nix flake show

    - name: Flake check
      run: |
        nix flake check -L

    - name: Run logwatch
      run: |
        nix run . -- --version

    - name: Formatter check
      run: |
        nix fmt
        git diff --exit-code
